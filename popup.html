<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      font-family: "Inter", -apple-system, BlinkMacSystemFont,
                   "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      background: #09090b;
      padding: 24px 22px 18px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      color: #e4e4e9;
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }

    .subtitle {
      font-size: 9px;
      color: #4e4e54;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .toggle-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #111113;
      border: 1px solid #232326;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: #c8c8cd;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #232326;
      border-radius: 24px;
      transition: background 0.25s ease;
    }
    .slider::before {
      content: '';
      position: absolute;
      left: 2px;
      top: 2px;
      width: 20px;
      height: 20px;
      background: #4e4e54;
      border-radius: 50%;
      transition: transform 0.25s ease, background 0.25s ease;
    }
    .toggle input:checked + .slider {
      background: #5a8a9e;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(20px);
      background: #e4e4e9;
    }

    .status {
      font-size: 10px;
      color: #4e4e54;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
      margin-bottom: 16px;
    }
    .status.active {
      color: #8fb4c8;
    }

    .footer {
      font-size: 8px;
      color: #2a2a2e;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="title">beA Dark Mode</div>
  <div class="subtitle">Anwaltspostfach</div>

  <div class="toggle-area">
    <span class="toggle-label">Dark Mode</span>
    <label class="toggle">
      <input type="checkbox" id="mainToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="status">Aus</div>
  <div class="footer">v1.2 &middot; rein kosmetisch</div>

  <script src="js/popup.js"></script>
</body>
</html>
